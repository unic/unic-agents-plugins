name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Node version
        id: node-ver
        run: |
          set -euo pipefail
          VERSION=$(grep '^useNodeVersion:' pnpm-workspace.yaml | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "::error::useNodeVersion not found in pnpm-workspace.yaml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        # reads packageManager from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-ver.outputs.version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Verify CHANGELOG
        run: pnpm verify:changelog
