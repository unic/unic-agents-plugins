# Ralph Orchestrator Configuration
# Project: unic-pr-review (re-review feature)
# Docs: https://github.com/mikeyobrien/ralph-orchestrator

cli:
  backend: "claude"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 50          # 8 specs * generous retry budget
  max_runtime_seconds: 14400  # 4 hours; abort if a spec stalls
